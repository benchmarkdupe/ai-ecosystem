services:
  ai-gateway:
    build: ./services/ai-gateway
    ports:
      - "3000:3000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_DEFAULT_MODEL=${OPENROUTER_DEFAULT_MODEL:-openai/gpt-oss-20b:free}
      - API_KEY=${API_KEY:-}
    restart: unless-stopped

  opportunity-engine:
    build: ./services/opportunity-engine
    ports:
      - "3001:3001"
    environment:
      - AI_GATEWAY_URL=http://ai-gateway:3000
      - API_KEY=${API_KEY:-}
      - AI_MODEL_DRAFT=${AI_MODEL_DRAFT:-openai/gpt-oss-20b:free}
      - AI_MODEL_CRITIC=${AI_MODEL_CRITIC:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
    volumes:
      - ./storage/db/opportunity-engine:/app/data
    depends_on:
      - ai-gateway
    restart: unless-stopped

  youtube-worker:
    build: ./services/youtube-worker
    ports:
      - "3002:3002"
    environment:
      - OPPORTUNITY_ENGINE_URL=http://opportunity-engine:3001
      - API_KEY=${API_KEY:-}
      - VIDEO_STORAGE_DIR=/app/videos
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID:-}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET:-}
      - YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN:-}
      - YOUTUBE_DEFAULT_PRIVACY=${YOUTUBE_DEFAULT_PRIVACY:-private}
    volumes:
      - ./storage/db/youtube-worker:/app/data
      - ./storage/videos:/app/videos
    depends_on:
      - ai-gateway
      - opportunity-engine
    restart: unless-stopped

  dashboard:
    build: ./services/dashboard
    ports:
      - "8080:8080"
    environment:
      - OPPORTUNITY_ENGINE_URL=http://opportunity-engine:3001
      - YOUTUBE_WORKER_URL=http://youtube-worker:3002
      - API_KEY=${API_KEY:-}
      - VIDEO_STORAGE_DIR=/app/videos
    volumes:
      - ./storage/videos:/app/videos:ro
    depends_on:
      - opportunity-engine
      - youtube-worker
    restart: unless-stopped
